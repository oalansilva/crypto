services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES:-crypto_app,workflow_registry,workflow_crypto}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/crypto_app}
      WORKFLOW_DB_ENABLED: ${WORKFLOW_DB_ENABLED:-1}
      WORKFLOW_DATABASE_URL: ${WORKFLOW_DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/workflow_registry}
      CRYPTO_DATABASE_URL: ${CRYPTO_DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/crypto_app}
      CRYPTO_WORKFLOW_DATABASE_URL: ${CRYPTO_WORKFLOW_DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/workflow_crypto}
      CRYPTO_FRONTEND_URL: ${CRYPTO_FRONTEND_URL:-http://localhost:${FRONTEND_PORT:-5173}}
      CRYPTO_BACKEND_URL: ${CRYPTO_BACKEND_URL:-http://backend:8003}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-0}
      CELERY_BATCH_MAX_RETRIES: ${CELERY_BATCH_MAX_RETRIES:-3}
      CELERY_RETRY_BACKOFF_MAX: ${CELERY_RETRY_BACKOFF_MAX:-300}
      ASYNC_JOB_TTL_SECONDS: ${ASYNC_JOB_TTL_SECONDS:-604800}
      ASYNC_DEAD_LETTER_MAX_ITEMS: ${ASYNC_DEAD_LETTER_MAX_ITEMS:-200}
    ports:
      - "${BACKEND_PORT:-8003}:8003"
    volumes:
      - .:/workspace
    working_dir: /workspace/backend
    command:
      [
        "sh",
        "-lc",
        "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/', timeout=5)\" >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/crypto_app}
      WORKFLOW_DB_ENABLED: ${WORKFLOW_DB_ENABLED:-1}
      WORKFLOW_DATABASE_URL: ${WORKFLOW_DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/workflow_registry}
      CRYPTO_DATABASE_URL: ${CRYPTO_DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/crypto_app}
      CRYPTO_WORKFLOW_DATABASE_URL: ${CRYPTO_WORKFLOW_DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/workflow_crypto}
      RUN_SIGNAL_MONITOR: ${RUN_SIGNAL_MONITOR:-1}
      RUN_SIGNAL_FEED_SNAPSHOT_WORKER: ${RUN_SIGNAL_FEED_SNAPSHOT_WORKER:-1}
      WORKER_LOG_LEVEL: ${WORKER_LOG_LEVEL:-INFO}
    volumes:
      - .:/workspace
    working_dir: /workspace/backend
    command: ["python", "-m", "app.workers.runtime_worker"]
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/crypto_app}
      WORKFLOW_DB_ENABLED: ${WORKFLOW_DB_ENABLED:-1}
      WORKFLOW_DATABASE_URL: ${WORKFLOW_DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/workflow_registry}
      CRYPTO_DATABASE_URL: ${CRYPTO_DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/crypto_app}
      CRYPTO_WORKFLOW_DATABASE_URL: ${CRYPTO_WORKFLOW_DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/workflow_crypto}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-0}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      CELERY_BATCH_MAX_RETRIES: ${CELERY_BATCH_MAX_RETRIES:-3}
      CELERY_RETRY_BACKOFF_MAX: ${CELERY_RETRY_BACKOFF_MAX:-300}
      ASYNC_JOB_TTL_SECONDS: ${ASYNC_JOB_TTL_SECONDS:-604800}
      ASYNC_DEAD_LETTER_MAX_ITEMS: ${ASYNC_DEAD_LETTER_MAX_ITEMS:-200}
    volumes:
      - .:/workspace
    working_dir: /workspace/backend
    command:
      [
        "celery",
        "-A",
        "app.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=${CELERY_WORKER_CONCURRENCY:-1}",
        "--prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}",
        "-Q",
        "batch_backtest",
      ]
    restart: unless-stopped

  postgres-backup:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_ON_STARTUP: ${BACKUP_ON_STARTUP:-1}
    volumes:
      - ./docker/postgres/backup.sh:/scripts/backup.sh:ro
      - ./backups/postgres:/backups
    entrypoint: ["sh", "/scripts/backup.sh"]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://backend:8003}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - .:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
    working_dir: /workspace/frontend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
