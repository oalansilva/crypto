name: CI

on:
  push:
  pull_request:

env:
  ARBITRAGE_MONITOR_ENABLED: "0"
  OPPORTUNITIES_SMOKE_MAX_SECONDS: "2.0"
  RUN_FRONTEND_BUILD: "false"

jobs:
  backend-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Check backend formatting
        run: python -m black --check backend

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend lint
        run: npm --prefix frontend run lint

  backend-tests:
    runs-on: ubuntu-latest
    needs:
      - backend-format
      - frontend-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest

      - name: Run backend tests
        run: pytest -q backend/tests/integration

      - name: Frontend build (optional while TS issues are being fixed)
        if: env.RUN_FRONTEND_BUILD == 'true'
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build

  e2e-playwright:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: npm --prefix frontend run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          if-no-files-found: ignore
          path: |
            frontend/playwright-report
            frontend/test-results
