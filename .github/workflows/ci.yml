name: CI/CD

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  ARBITRAGE_MONITOR_ENABLED: "0"
  OPPORTUNITIES_SMOKE_MAX_SECONDS: "2.0"
  MIN_BACKEND_TOTAL_COVERAGE: "70"
  MIN_BACKEND_DIFF_COVERAGE: "70"

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend_app_python: ${{ steps.filter.outputs.backend_app_python }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend source changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend_app_python:
              - 'backend/app/**/*.py'

  openspec-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate all OpenSpec changes and specs
        run: npx --yes @fission-ai/openspec@1.5.0 validate --all

  qa-policy:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      visual_skip: ${{ steps.policy.outputs.visual_skip }}
      visual_skip_reason: ${{ steps.policy.outputs.visual_skip_reason }}
    steps:
      - name: Validate visual QA opt-out authorization
        id: policy
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            const body = `${pullRequest.title || ''}\n${pullRequest.body || ''}`;
            const references = [...body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|refs?)\s*:?\s*#(\d+)/gi)];
            const branchReference = pullRequest.head.ref.match(/(?:^|\/)(?:card|change)-(\d+)(?:-|$)/i);
            const issueNumber = Number(references.at(-1)?.[1] || branchReference?.[1]);

            core.setOutput('visual_skip', 'false');
            core.setOutput('visual_skip_reason', 'Visual QA required by default.');

            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              core.notice('No linked issue found. Visual QA remains required.');
              return;
            }

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const hasSkipLabel = issue.data.labels.some((label) => {
              const name = typeof label === 'string' ? label : label.name;
              return name?.toLowerCase() === 'qa-visual-skip';
            });

            if (!hasSkipLabel) {
              core.notice(`Issue #${issueNumber} has no qa-visual-skip label. Visual QA remains required.`);
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const alanLogin = context.repo.owner.toLowerCase();
            const authorization = /^\s*QA visual dispensado por Alan\.\s*\r?\n\s*Motivo\s*:\s*\S[\s\S]*$/i;
            const authorized = comments.some((comment) =>
              comment.user?.login?.toLowerCase() === alanLogin && authorization.test(comment.body || ''),
            );

            if (!authorized) {
              core.setFailed(
                `Issue #${issueNumber} has qa-visual-skip but no valid authorization from @${context.repo.owner}. ` +
                'Required comment: "QA visual dispensado por Alan." followed by "Motivo: ...".',
              );
              return;
            }

            core.setOutput('visual_skip', 'true');
            core.setOutput('visual_skip_reason', `Authorized by @${context.repo.owner} on issue #${issueNumber}.`);
            core.notice(`Visual QA skipped for issue #${issueNumber} with auditable Alan authorization.`);

  backend-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Check backend formatting
        run: python -m black --check backend

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend lint
        run: npm --prefix frontend run lint

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run all frontend unit tests
        run: npm --prefix frontend run test:unit

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend
        run: |
          npm --prefix frontend run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          if-no-files-found: error
          path: frontend/dist

  backend-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: ${{ github.workspace }}
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      WORKFLOW_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crypto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crypto"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend unit tests
        shell: bash
        run: |
          set -euo pipefail
          for test_file in backend/tests/unit/test_*.py; do
            echo "::group::${test_file}"
            timeout 180s coverage run --parallel-mode --source=backend/app -m pytest -q "${test_file}"
            echo "::endgroup::"
          done

      - name: Upload backend unit coverage data
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-coverage-data
          if-no-files-found: error
          include-hidden-files: true
          path: .coverage.*

  backend-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      WORKFLOW_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crypto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crypto"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend tests with coverage
        run: |
          coverage run --parallel-mode --source=backend/app \
            -m pytest -q backend/tests/integration

      - name: Upload backend integration coverage data
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-coverage-data
          if-no-files-found: error
          include-hidden-files: true
          path: .coverage.*

  backend-coverage-gate:
    runs-on: ubuntu-latest
    needs:
      - changes
      - backend-unit-tests
      - backend-tests
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: backend-*-coverage-data
          path: coverage-artifact
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install coverage tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage diff-cover

      - name: Combine backend coverage data
        run: |
          coverage combine coverage-artifact
          coverage xml -o coverage.xml
          coverage report --fail-under "${MIN_BACKEND_TOTAL_COVERAGE}"

      - name: Report backend diff coverage
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if ! git diff --name-only "origin/${BASE_REF}"...HEAD | grep -Eq '^backend/app/.*\.py$'; then
            echo "No backend/app Python changes in this PR. Diff coverage gate skipped."
            exit 0
          fi

          diff-cover coverage.xml \
            --compare-branch "origin/${BASE_REF}" \
            --fail-under "${MIN_BACKEND_DIFF_COVERAGE}" \
            --include "backend/app/*.py" \
            --include "backend/app/**/*.py"

  e2e-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend-tests
      - qa-policy
    if: >-
      always() && needs.backend-tests.result == 'success' &&
      (github.event_name != 'pull_request' || needs.qa-policy.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Run functional Playwright tests
        run: npm --prefix frontend run test:e2e:functional

      - name: Run visual Playwright tests
        if: needs.qa-policy.outputs.visual_skip != 'true'
        run: npm --prefix frontend run test:e2e:visual

      - name: Record authorized visual QA skip
        if: needs.qa-policy.outputs.visual_skip == 'true'
        run: echo "${{ needs.qa-policy.outputs.visual_skip_reason }}"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            frontend/playwright-report
            frontend/test-results

  qa-gate:
    name: qa-gate
    runs-on: ubuntu-latest
    if: >-
      always() && github.event_name == 'pull_request' &&
      github.base_ref == 'develop'
    needs:
      - openspec-validate
      - backend-format
      - frontend-lint
      - frontend-tests
      - frontend-build
      - backend-unit-tests
      - backend-tests
      - backend-coverage-gate
      - qa-policy
      - e2e-playwright
    steps:
      - name: Require all QA checks to finish green
        shell: bash
        run: |
          set -euo pipefail
          results=(
            "openspec-validate=${{ needs.openspec-validate.result }}"
            "backend-format=${{ needs.backend-format.result }}"
            "frontend-lint=${{ needs.frontend-lint.result }}"
            "frontend-tests=${{ needs.frontend-tests.result }}"
            "frontend-build=${{ needs.frontend-build.result }}"
            "backend-unit-tests=${{ needs.backend-unit-tests.result }}"
            "backend-tests=${{ needs.backend-tests.result }}"
            "backend-coverage-gate=${{ needs.backend-coverage-gate.result }}"
            "qa-policy=${{ needs.qa-policy.result }}"
            "e2e-playwright=${{ needs.e2e-playwright.result }}"
          )

          for result in "${results[@]}"; do
            printf '%s\n' "$result"
            test "${result#*=}" = 'success'
          done

  deploy-staging:
    runs-on: ubuntu-latest
    needs:
      - openspec-validate
      - backend-format
      - frontend-lint
      - frontend-tests
      - frontend-build
      - backend-unit-tests
      - backend-tests
      - e2e-playwright
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop' && vars.ENABLE_STAGING_DEPLOY == 'true'
    environment:
      name: staging
    concurrency:
      group: staging-deploy
      cancel-in-progress: false
    env:
      STAGING_SSH_HOST: ${{ vars.STAGING_SSH_HOST }}
      STAGING_SSH_PORT: ${{ vars.STAGING_SSH_PORT }}
      STAGING_SSH_USER: ${{ vars.STAGING_SSH_USER }}
      STAGING_APP_DIR: ${{ vars.STAGING_APP_DIR }}
      STAGING_HEALTHCHECK_URL: ${{ vars.STAGING_HEALTHCHECK_URL }}
      STAGING_DEPLOY_REF: ${{ vars.STAGING_DEPLOY_REF }}
      STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
    steps:
      - name: Validate staging deploy configuration
        run: |
          test -n "${STAGING_SSH_HOST}" || { echo "Missing repo variable: STAGING_SSH_HOST"; exit 1; }
          test -n "${STAGING_SSH_USER}" || { echo "Missing repo variable: STAGING_SSH_USER"; exit 1; }
          test -n "${STAGING_APP_DIR}" || { echo "Missing repo variable: STAGING_APP_DIR"; exit 1; }
          test -n "${STAGING_SSH_KEY}" || { echo "Missing repo secret: STAGING_SSH_KEY"; exit 1; }

      - name: Prepare SSH
        run: |
          PORT="${STAGING_SSH_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "${STAGING_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${PORT}" "${STAGING_SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy develop to staging
        run: |
          PORT="${STAGING_SSH_PORT:-22}"
          DEPLOY_REF="${STAGING_DEPLOY_REF:-develop}"
          ssh -p "${PORT}" "${STAGING_SSH_USER}@${STAGING_SSH_HOST}" <<EOF
          set -euo pipefail
          cd "${STAGING_APP_DIR}"
          git fetch origin --prune
          git checkout develop
          git reset --hard "origin/${DEPLOY_REF}"
          ./stop.sh
          ./start.sh
          EOF

      - name: Verify staging healthcheck
        if: vars.STAGING_HEALTHCHECK_URL != ''
        run: |
          curl --fail --show-error --silent \
            --retry 20 \
            --retry-delay 3 \
            --retry-all-errors \
            "${STAGING_HEALTHCHECK_URL}"
