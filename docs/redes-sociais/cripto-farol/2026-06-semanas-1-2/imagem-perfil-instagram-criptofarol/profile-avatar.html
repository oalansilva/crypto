<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Cripto Farol — Avatar Instagram</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #03111F;
      font-family: Inter, Arial, sans-serif;
    }
    .canvas {
      width: 1080px;
      height: 1080px;
      position: relative;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 68% 35%, rgba(242,201,91,.30) 0 10%, rgba(242,201,91,.08) 25%, transparent 48%),
        radial-gradient(circle at 34% 60%, rgba(18,183,202,.35) 0 18%, rgba(18,183,202,.10) 39%, transparent 63%),
        linear-gradient(145deg, #03111F 0%, #062640 48%, #020914 100%);
    }
    .safe-ring {
      width: 840px;
      height: 840px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 45%, rgba(6,38,64,.95), rgba(3,17,31,.94) 68%),
        #03111F;
      border: 18px solid rgba(157,234,255,.92);
      box-shadow:
        0 0 0 34px rgba(18,183,202,.12),
        0 34px 90px rgba(0,0,0,.40),
        inset 0 0 80px rgba(18,183,202,.12);
      position: relative;
    }
    .safe-ring::after {
      content: "";
      position: absolute;
      inset: 58px;
      border-radius: 50%;
      border: 3px solid rgba(242,201,91,.24);
    }
    .mark-wrap {
      width: 630px;
      height: 630px;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 24px 34px rgba(0,0,0,.45));
      z-index: 2;
    }
    .signature {
      position: absolute;
      bottom: 118px;
      left: 0;
      right: 0;
      text-align: center;
      color: #F7F4EA;
      font-size: 48px;
      font-weight: 850;
      letter-spacing: -1px;
      text-shadow: 0 4px 18px rgba(0,0,0,.55);
      z-index: 3;
    }
    .signature span { color: #12B7CA; }
  </style>
</head>
<body>
  <main class="canvas" aria-label="Avatar Cripto Farol">
    <section class="safe-ring">
      <div class="mark-wrap">
        <svg width="630" height="630" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cripto Farol">
          <rect width="256" height="256" rx="52" fill="transparent"/>
          <circle cx="128" cy="128" r="92" fill="#062640"/>
          <circle cx="128" cy="128" r="92" stroke="#9DEAFF" stroke-width="10"/>
          <path d="M44 150C75 127 101 128 128 151C156 175 185 178 212 154V202H44V150Z" fill="#083B5D"/>
          <path d="M44 151C75 128 101 128 128 151C156 175 185 178 212 154" stroke="#9DEAFF" stroke-width="11" stroke-linecap="round"/>
          <path d="M69 108C95 82 131 67 195 52" stroke="#F2C95B" stroke-width="14" stroke-linecap="round"/>
          <path d="M82 127C113 106 143 98 194 93" stroke="#12B7CA" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
          <path d="M123 49L154 91L145 183H104L94 91L123 49Z" fill="#03111F" stroke="#F7F4EA" stroke-width="9" stroke-linejoin="round"/>
          <path d="M109 98H140" stroke="#9DEAFF" stroke-width="9" stroke-linecap="round"/>
          <path d="M106 126H143" stroke="#9DEAFF" stroke-width="9" stroke-linecap="round"/>
          <path d="M113 183L101 207" stroke="#F7F4EA" stroke-width="9" stroke-linecap="round"/>
          <path d="M136 183L151 207" stroke="#F7F4EA" stroke-width="9" stroke-linecap="round"/>
          <circle cx="123" cy="49" r="8" fill="#F2C95B"/>
          <circle cx="125" cy="157" r="10" fill="#F2C95B"/>
        </svg>
      </div>
      <div class="signature">Cripto<span>Farol</span></div>
    </section>
  </main>
</body>
</html>
