<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Card #151 - Pacote Revisto</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #04121c;
      --panel: #071f2e;
      --panel-2: #0b2b3b;
      --line: rgba(148, 210, 235, .22);
      --text: #f3fbff;
      --muted: #a8c7d5;
      --cyan: #78d7ff;
      --cyan-2: #20b8e8;
      --gold: #f6c44b;
      --green: #72e6a0;
      --red: #ff8f8f;
      --ink: #031018;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #020a10;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 20px 72px;
    }

    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: 0; }
    p { color: var(--muted); line-height: 1.55; }
    a { color: var(--cyan); }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      align-items: start;
    }

    figure { margin: 0; }
    figcaption { margin-top: 10px; color: var(--muted); font-size: 14px; }

    .creative {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 78% 18%, rgba(120, 215, 255, .24), transparent 24%),
        radial-gradient(circle at 18% 92%, rgba(246, 196, 75, .18), transparent 30%),
        linear-gradient(135deg, #031018 0%, #061d2b 42%, #0a3142 100%);
      border: 1px solid rgba(148, 210, 235, .24);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .42);
    }

    .linkedin { width: 1200px; height: 627px; max-width: 100%; aspect-ratio: 1200 / 627; }
    .instagram { width: 1080px; height: 1350px; max-width: 100%; aspect-ratio: 4 / 5; }

    .creative::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(148, 210, 235, .06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 210, 235, .06) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(115deg, transparent 0 18%, #000 42%, transparent 78%);
      opacity: .75;
      z-index: -2;
    }

    .creative::after {
      content: "";
      position: absolute;
      right: -160px;
      top: 86px;
      width: 680px;
      height: 220px;
      transform: rotate(-17deg);
      background: linear-gradient(90deg, rgba(246, 196, 75, .56), rgba(120, 215, 255, .16), transparent);
      clip-path: polygon(0 40%, 100% 0, 100% 100%, 0 60%);
      opacity: .78;
      z-index: -1;
    }

    .inner {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 30px;
      padding: 54px 64px 46px;
    }

    .linkedin .inner {
      gap: 14px;
      padding: 42px 64px 34px;
    }

    .instagram .inner { padding: 72px 72px 64px; gap: 44px; }

    .brand {
      display: flex;
      align-items: center;
      width: fit-content;
    }

    .brand img {
      display: block;
      width: 286px;
      height: auto;
    }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1.06fr) minmax(360px, .94fr);
      align-items: center;
      gap: 44px;
    }

    .instagram .split {
      grid-template-columns: 1fr;
      align-items: stretch;
      gap: 42px;
    }

    .eyebrow {
      margin-bottom: 16px;
      color: var(--gold);
      font-size: 20px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .instagram .eyebrow { font-size: 24px; }

    .title {
      margin: 0;
      max-width: 680px;
      color: var(--text);
      font-size: 60px;
      line-height: .98;
      letter-spacing: 0;
      font-weight: 900;
    }

    .linkedin .title { font-size: 50px; }

    .instagram .title {
      max-width: 900px;
      font-size: 84px;
      line-height: 1;
    }

    .subtitle {
      margin: 22px 0 0;
      max-width: 620px;
      color: #d9f1fb;
      font-size: 25px;
      line-height: 1.22;
      font-weight: 650;
    }

    .instagram .subtitle {
      max-width: 880px;
      font-size: 40px;
      line-height: 1.18;
    }

    .proof {
      position: relative;
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .035));
      border-radius: 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      min-height: 320px;
    }

    .instagram .proof { min-height: 480px; padding: 24px; }

    .linkedin .proof {
      min-height: 0;
      gap: 10px;
      padding: 16px;
    }

    .proof-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 780;
    }

    .signal-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(148, 210, 235, .16);
      background: rgba(3, 16, 24, .52);
      border-radius: 14px;
    }

    .pair { color: #fff; font-size: 22px; font-weight: 850; }
    .meta { margin-top: 4px; color: var(--muted); font-size: 14px; }
    .badge { padding: 8px 10px; border-radius: 999px; color: #042113; font-size: 14px; font-weight: 900; background: var(--green); }
    .badge.red { color: #2d0b0b; background: var(--red); }
    .badge.neutral { color: #261d04; background: var(--gold); }

    .decision-list {
      display: grid;
      gap: 12px;
    }

    .decision-card {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 14px;
      align-items: start;
      padding: 15px;
      border: 1px solid rgba(148, 210, 235, .16);
      background: rgba(3, 16, 24, .52);
      border-radius: 14px;
    }

    .decision-card .mark {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      color: var(--ink);
      background: linear-gradient(135deg, var(--gold), #ffd76e);
      font-size: 24px;
      font-weight: 950;
    }

    .decision-card strong {
      display: block;
      color: #fff;
      font-size: 22px;
      line-height: 1.05;
    }

    .decision-card span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.25;
    }

    .instagram .decision-list { gap: 18px; }
    .instagram .decision-card { grid-template-columns: 64px 1fr; padding: 22px; }
    .instagram .decision-card .mark { width: 64px; height: 64px; font-size: 30px; border-radius: 18px; }
    .instagram .decision-card strong { font-size: 34px; }
    .instagram .decision-card span { font-size: 24px; }

    .linkedin .decision-list { gap: 10px; }
    .linkedin .decision-card { grid-template-columns: 42px 1fr; gap: 12px; padding: 12px; }
    .linkedin .decision-card .mark { width: 42px; height: 42px; font-size: 22px; }
    .linkedin .decision-card strong { font-size: 20px; }
    .linkedin .decision-card span { font-size: 14px; margin-top: 4px; }

    .tiles {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .tile {
      min-height: 72px;
      padding: 12px;
      border: 1px solid rgba(148, 210, 235, .16);
      border-radius: 14px;
      background: rgba(3, 16, 24, .48);
    }

    .tile span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 760;
    }

    .tile strong { display: block; margin-top: 8px; color: #fff; font-size: 20px; }

    .footer {
      display: grid;
      grid-template-columns: auto minmax(280px, 520px);
      justify-content: space-between;
      align-items: end;
      gap: 28px;
    }

    .instagram .footer { grid-template-columns: 1fr; gap: 18px; }

    .cta {
      width: max-content;
      max-width: 100%;
      padding: 17px 22px;
      border-radius: 10px;
      color: var(--ink);
      background: linear-gradient(135deg, var(--gold), #ffd76e);
      font-size: 24px;
      font-weight: 900;
      box-shadow: 0 18px 42px rgba(246, 196, 75, .18);
    }

    .instagram .cta { font-size: 32px; padding: 20px 26px; }

    .linkedin .cta {
      padding: 14px 20px;
      font-size: 22px;
    }

    .note {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.35;
    }

    .linkedin .note { font-size: 17px; }

    .instagram .note { font-size: 26px; max-width: 820px; }

    .poster .inner { display: flex; flex-direction: column; justify-content: space-between; }
    .poster .title { max-width: 890px; font-size: 90px; }
    .poster .subtitle { font-size: 38px; max-width: 860px; }

    .slide-number {
      position: absolute;
      right: 72px;
      top: 76px;
      color: rgba(243, 251, 255, .38);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: .12em;
    }

    .stack {
      display: grid;
      gap: 18px;
      max-width: 870px;
    }

    .point {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 18px;
      align-items: start;
      padding: 22px;
      border-radius: 18px;
      background: rgba(255,255,255,.065);
      border: 1px solid rgba(148,210,235,.18);
    }

    .num {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 16px;
      color: var(--ink);
      background: var(--gold);
      font-size: 26px;
      font-weight: 950;
    }

    .point strong { display: block; color: #fff; font-size: 32px; line-height: 1.1; }
    .point span { display: block; margin-top: 8px; color: var(--muted); font-size: 25px; line-height: 1.24; }

    .qa {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 28px;
      max-width: 820px;
    }

    .qa div {
      border-radius: 18px;
      padding: 22px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(148,210,235,.18);
    }

    .qa span { display: block; color: var(--muted); font-size: 18px; text-transform: uppercase; letter-spacing: .08em; font-weight: 780; }
    .qa strong { display: block; margin-top: 14px; font-size: 34px; line-height: 1.08; }

    @media (max-width: 900px) {
      .split { grid-template-columns: 1fr; }
      .footer { grid-template-columns: 1fr; }
    }
  </style>
</head>
