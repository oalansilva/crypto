<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f23; 
    color: #fff; 
    padding: 20px;
    min-height: 100vh;
  }
  .container { max-width: 800px; margin: 0 auto; }
  
  /* FearGreedBanner */
  .fear-greed-banner {
    background: linear-gradient(90deg, #e94560 0%, #f5a623 50%, #00d26a 100%);
    border-radius: 12px;
    padding: 16px 24px;
    text-align: center;
    margin-bottom: 24px;
  }
  .fear-greed-banner .label {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }
  .fear-greed-banner .value {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  
  /* SignalCard */
  .signal-card {
    background: #1a1a2e;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    border: 1px solid #2a2a4e;
  }
  .signal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .pair-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .pair-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #f7931a, #ffab40);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .pair-name {
    font-size: 24px;
    font-weight: 700;
  }
  .pair-type {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
  }
  
  /* SentimentBadge */
  .sentiment-badge {
    background: #00d26a;
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  /* Signal Actions */
  .signal-action {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }
  .action-badge {
    background: #00d26a;
    color: #fff;
    padding: 12px 32px;
    border-radius: 8px;
    font-size: 20px;
    font-weight: 700;
  }
  
  /* Confidence Bar */
  .confidence-section { flex: 1; }
  .confidence-label {
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
  }
  .confidence-bar {
    height: 8px;
    background: #3b3b5c;
    border-radius: 4px;
    overflow: hidden;
  }
  .confidence-fill {
    height: 100%;
    width: 87%;
    background: linear-gradient(90deg, #00d26a, #00ff88);
    border-radius: 4px;
  }
  .confidence-value {
    font-size: 14px;
    font-weight: 600;
    color: #00d26a;
    margin-top: 4px;
  }
  
  /* Sentiment Breakdown */
  .sentiment-breakdown {
    background: #1a1a2e;
    border-radius: 16px;
    padding: 24px;
    border: 1px solid #2a2a4e;
  }
  .breakdown-title {
    font-size: 14px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }
  .breakdown-item {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }
  .breakdown-icon {
    width: 32px;
    height: 32px;
    background: #2a2a4e;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .breakdown-label {
    width: 80px;
    font-size: 14px;
    color: #ccc;
  }
  .breakdown-bar {
    flex: 1;
    height: 8px;
    background: #3b3b5c;
    border-radius: 4px;
    overflow: hidden;
  }
  .breakdown-fill {
    height: 100%;
    background: #00d26a;
    border-radius: 4px;
  }
  .breakdown-value {
    width: 50px;
    font-size: 14px;
    font-weight: 600;
    color: #00d26a;
    text-align: right;
  }
</style>
</head>
<body>
  <div class="container">
    <!-- FearGreedBanner -->
    <div class="fear-greed-banner">
      <div class="label">FEAR & GREED INDEX</div>
      <div class="value">72 — GREED</div>
    </div>
    
    <!-- SignalCard -->
    <div class="signal-card">
      <div class="signal-header">
        <div class="pair-info">
          <div class="pair-icon">₿</div>
          <div>
            <div class="pair-name">BTC/USDT</div>
            <div class="pair-type">Spot Trading</div>
          </div>
        </div>
        <div class="sentiment-badge">✓ Confirma</div>
      </div>
      
      <div class="signal-action">
        <div class="action-badge">BUY</div>
        <div class="confidence-section">
          <div class="confidence-label">Confiança do Sinal</div>
          <div class="confidence-bar">
            <div class="confidence-fill"></div>
          </div>
          <div class="confidence-value">87%</div>
        </div>
      </div>
    </div>
    
    <!-- Sentiment Breakdown -->
    <div class="sentiment-breakdown">
      <div class="breakdown-title">Sentiment Breakdown</div>
      <div class="breakdown-item">
        <div class="breakdown-icon">📰</div>
        <div class="breakdown-label">News</div>
        <div class="breakdown-bar">
          <div class="breakdown-fill" style="width: 72%"></div>
        </div>
        <div class="breakdown-value">+0.45</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-icon">👥</div>
        <div class="breakdown-label">Reddit</div>
        <div class="breakdown-bar">
          <div class="breakdown-fill" style="width: 61%"></div>
        </div>
        <div class="breakdown-value">+0.38</div>
      </div>
    </div>
  </div>
</body>
</html>
